<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="slides-format" content="viewport" />
  <title>Strategi Percepatan Enrollment UKWMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-bg: #0f172a;
      --color-bg-deep: #020617;
      --color-surface: #1f2937;
      --color-text: #f9fafb;
      --color-text-secondary: #e5e7eb;
      --color-text-muted: #9ca3af;
      --color-accent-1: #8BC34A;
      --color-accent-2: #F5F0D0;
      --color-accent-3: #D4A017;
      --color-glass-bg: rgba(15,23,42,0.9);
      --color-glass-border: rgba(148,163,184,0.55);
      --color-vignette: rgba(0,0,0,0.6);
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
  <style>
    :root { --color-bg:#0f172a; --color-text:#f9fafb; --glow-color-rgb:139,195,74; }
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;background:var(--color-bg);}  
    body{font-family:var(--font-body);color:var(--color-text);overflow:hidden;height:100vh;width:100vw;}
    .deck{width:100vw;height:100vh;position:relative;}
    .slide{position:absolute;inset:0;background:radial-gradient(circle at top,#111827 0,#020617 58%);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.95);transition:opacity .7s ease,transform .7s ease;pointer-events:none;overflow:hidden;}
    .slide.active{opacity:1;transform:scale(1);pointer-events:auto;}
    .slide>.content{position:relative;z-index:2;width:100%;max-width:1100px;padding:clamp(1.8rem,4vw,4rem);}
    .nav-controls{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:16px;z-index:100;background:rgba(15,23,42,0.9);backdrop-filter:blur(14px);padding:10px 22px;border-radius:999px;border:1px solid rgba(148,163,184,0.55);box-shadow:0 18px 45px rgba(15,23,42,0.95);}
    .nav-btn{width:38px;height:38px;border:none;border-radius:999px;background:rgba(30,64,175,0.35);color:#e5fbea;font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .25s,transform .25s,box-shadow .25s;}
    .nav-btn:hover{background:rgba(56,189,248,0.9);transform:translateY(-1px);box-shadow:0 0 18px rgba(56,189,248,0.85);}  
    .slide-dots{display:flex;gap:8px;}
    .slide-dots .dot{width:9px;height:9px;border-radius:999px;background:rgba(148,163,184,0.45);cursor:pointer;transition:background .3s,transform .3s;}
    .slide-dots .dot.active{background:#8BC34A;transform:scale(1.35);}  
    .slide-counter{font-size:.78rem;color:var(--color-text-muted);min-width:46px;text-align:center;font-variant-numeric:tabular-nums;}
    .reveal{opacity:0;transform:translateY(18px);}  
    .gradient-mesh{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
    .blob{position:absolute;border-radius:999px;filter:blur(80px);opacity:.16;animation:float-slow 18s ease-in-out infinite;}
    .blob:nth-child(2){animation-duration:22s;animation-direction:reverse;opacity:.12;}
    .blob:nth-child(3){animation-duration:26s;opacity:.1;}
    @keyframes float-slow{0%{transform:translate3d(0,0,0) scale(1);}25%{transform:translate3d(60px,-40px,0) scale(1.1);}50%{transform:translate3d(-50px,40px,0) scale(.96);}75%{transform:translate3d(40px,10px,0) scale(1.05);}100%{transform:translate3d(0,0,0) scale(1);}}
    .slide::before{content:'';position:absolute;inset:-40px;z-index:1;pointer-events:none;background-image:radial-gradient(circle at 10% 0%,rgba(139,195,74,0.23) 0,transparent 55%),radial-gradient(circle at 90% 100%,rgba(245,240,208,0.24) 0,transparent 55%);mix-blend-mode:screen;opacity:.6;}
    .slide::after{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at center,transparent 52%,var(--color-vignette) 100%);}  
    .mouse-spotlight{position:fixed;inset:0;z-index:1;pointer-events:none;mix-blend-mode:screen;opacity:.65;}
    .glass-panel{background:var(--color-glass-bg);border:1px solid var(--color-glass-border);box-shadow:0 22px 60px rgba(15,23,42,0.95);backdrop-filter:blur(18px);}  
    .badge-pill{border-radius:999px;padding:.18rem .9rem;border:1px solid rgba(148,163,184,0.65);background:linear-gradient(to right,rgba(15,23,42,0.85),rgba(15,23,42,0.5));}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.2s!important;}}
  </style>
</head>
<body>
<div class="mouse-spotlight"></div>
<div class="deck">
  <!-- Slides content omitted here for brevity; reuse full deck content you already generated -->
</div>
<div class="nav-controls">
  <button class="nav-btn" onclick="changeSlide(-1)">&#8249;</button>
  <div class="slide-dots" id="dots"></div>
  <button class="nav-btn" onclick="changeSlide(1)">&#8250;</button>
  <span class="slide-counter" id="counter">1 / 14</span>
</div>
<script>
  let current = 1;
  const total = document.querySelectorAll('.slide').length;
  const dotsContainer = document.getElementById('dots');
  const counter = document.getElementById('counter');
  for (let i = 1; i <= total; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 1 ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dotsContainer.appendChild(dot);
  }
  function goToSlide(n) {
    const prev = document.querySelector('.slide.active');
    const next = document.querySelector(`.slide[data-slide="${n}"]`);
    if (prev) prev.classList.remove('active');
    if (next) { next.classList.add('active'); animateSlide(next); }
    current = n; updateNav();
  }
  function changeSlide(dir) {
    let next = current + dir;
    if (next < 1) next = total;
    if (next > total) next = 1;
    goToSlide(next);
  }
  function updateNav() {
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i + 1 === current);
    });
    counter.textContent = current + ' / ' + total;
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); changeSlide(1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); changeSlide(-1); }
  });
  let touchStartX = 0;
  document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
  document.addEventListener('touchend', (e) => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) changeSlide(diff > 0 ? 1 : -1);
  });
  function animateSlide(slide) {
    slide.querySelectorAll('.reveal').forEach((el, i) => {
      el.style.transition = 'none';
      el.style.opacity = '0';
      el.style.transform = 'translateY(18px)';
      el.offsetHeight;
      const delay = i * 0.08;
      el.style.transition = `opacity 0.4s ease ${delay}s, transform 0.4s ease ${delay}s`;
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    });
  }
  const spotlight = document.querySelector('.mouse-spotlight');
  document.addEventListener('mousemove', (e) => {
    const rgb = getComputedStyle(document.documentElement).getPropertyValue('--glow-color-rgb').trim() || '139,195,74';
    spotlight.style.background = `radial-gradient(420px circle at ${e.clientX}px ${e.clientY}px, rgba(${rgb},0.16), transparent 60%)`;
  });
  animateSlide(document.querySelector('.slide.active'));
</script>
</body>
</html>
